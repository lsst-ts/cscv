<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSC Versions Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
      <style>

    body {
      text-align: center;
    }
    .spinner {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #50A9E0;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  </head>
  <body class="bg-gray-900 text-gray-100 p-6 font-sans min-h-screen">
    <div class="max-w-6xl mx-auto">
      <h1 class="text-4xl font-bold text-white mt-3 mb-8">CSC Versions Dashboard</h1>
        <div id="content">
          <div class="mb-10 p-6 rounded-2xl bg-gray-700 shadow-inner">
            <div class="spinner"></div>
            <p class="text-2xl font-bold text-white mb-4"> loading...</p>
          </div >
        </div>
        <script>
          fetch("{{ request.url_for('csc_versions') }}")
            .then(response => response.text())
            .then(html => {
              // Replace the loading message with actual content
              document.getElementById("content").innerHTML = html;
            })
            .catch(err => {
              document.getElementById("content").innerHTML = `<p>Error loading data: ${err}</p>`;
            });
        </script>
    </div>
  </body>
</html>
